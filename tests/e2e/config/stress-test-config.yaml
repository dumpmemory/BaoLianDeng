mixed-port: 7890
mode: global
log-level: debug
allow-lan: false
external-controller: 127.0.0.1:9090

geo-auto-update: false

dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: redir-host
  nameserver:
    - https://__HOST_IP__:18444/dns-query

proxies:
  - name: e2e-ss
    type: ss
    server: __HOST_IP__
    port: 18388
    cipher: aes-256-gcm
    password: e2e-test-password
    udp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - e2e-ss
  - name: GLOBAL
    type: select
    proxies:
      - e2e-ss

rules:
  - MATCH,e2e-ss
